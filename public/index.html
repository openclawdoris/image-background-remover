<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片工具 - AI 背景移除</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .upload-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .upload-hover:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(102, 126, 234, 0.5);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(56, 239, 125, 0.5);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg">
    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-animation"></div>
        <div class="absolute top-40 right-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-animation" style="animation-delay: -2s;"></div>
        <div class="absolute bottom-20 left-1/2 w-72 h-72 bg-cyan-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 float-animation" style="animation-delay: -4s;"></div>
    </div>

    <div class="relative min-h-screen flex flex-col">
        <!-- Header -->
        <header class="glass-effect border-b border-white/20 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-6 py-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl gradient-bg flex items-center justify-center shadow-lg">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
                                图片工具
                            </h1>
                            <p class="text-sm text-gray-500">AI 驱动的智能图片处理</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 px-4 py-2 bg-white/50 rounded-full">
                            <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                            </svg>
                            <span class="text-sm font-medium text-gray-700">在线可用</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 py-12 px-6">
            <div class="max-w-6xl mx-auto">
                <!-- Hero Section -->
                <div class="text-center mb-12 fade-in">
                    <div class="inline-flex items-center gap-2 px-4 py-2 bg-white/60 rounded-full mb-6 glass-effect">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <span class="text-sm font-medium text-gray-700">AI 模型已就绪</span>
                    </div>
                    <h2 class="text-4xl md:text-5xl font-bold text-white mb-4 drop-shadow-lg">
                        一键移除图片背景
                    </h2>
                    <p class="text-xl text-white/90 max-w-2xl mx-auto drop-shadow">
                        上传图片，AI 自动帮你移除背景，秒出高质量结果
                    </p>
                </div>

                <!-- Main Card -->
                <div class="glass-effect rounded-3xl shadow-2xl border border-white/30 overflow-hidden">
                    <div class="grid lg:grid-cols-2 gap-0">
                        <!-- Left: Upload Section -->
                        <div class="p-8 lg:p-10 border-b lg:border-b-0 lg:border-r border-white/20">
                            <div class="space-y-6">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-semibold text-gray-800">上传图片</h3>
                                        <p class="text-sm text-gray-500">支持 JPG、PNG、WEBP 格式</p>
                                    </div>
                                </div>

                                <!-- Upload Area -->
                                <div id="upload-area" class="upload-hover relative group cursor-pointer">
                                    <div class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center hover:border-purple-500 hover:bg-purple-50/50 transition-all">
                                        <div class="relative">
                                            <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-purple-100 to-blue-100 flex items-center justify-center group-hover:scale-110 transition-transform">
                                                <svg class="w-10 h-10 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2z"/>
                                                </svg>
                                            </div>
                                        </div>
                                        <p class="text-lg font-semibold text-gray-700 mb-2">点击或拖拽上传</p>
                                        <p class="text-sm text-gray-500">最大支持 10MB</p>
                                        <input type="file" id="file-input" accept="image/*" class="hidden">
                                    </div>
                                </div>

                                <!-- Preview Section -->
                                <div id="preview-section" class="hidden space-y-4 fade-in">
                                    <div class="bg-gray-50 rounded-2xl p-4 border border-gray-200">
                                        <div class="flex items-center justify-between mb-3">
                                            <div class="flex items-center gap-3">
                                                <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center">
                                                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2z"/>
                                                    </svg>
                                                </div>
                                                <div>
                                                    <p class="text-sm font-semibold text-gray-800" id="file-name"></p>
                                                    <p class="text-xs text-gray-500" id="file-size"></p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="relative aspect-video bg-gray-100 rounded-xl overflow-hidden">
                                            <img id="preview-image" class="w-full h-full object-contain" alt="Preview">
                                        </div>
                                    </div>

                                    <!-- Action Buttons -->
                                    <div class="flex gap-3">
                                        <button id="process-btn" class="flex-1 btn-primary text-white py-4 px-6 rounded-xl font-semibold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                            <span id="process-text">开始处理</span>
                                            <span id="processing-text" class="hidden items-center gap-2">
                                                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 0H12c-4.418 0-8 3.582-8 8 0 01.709 3.291z"></path>
                                                </svg>
                                                AI 处理中...
                                            </span>
                                        </button>
                                        <button id="reset-btn" class="px-6 py-4 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200 transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <!-- Message -->
                                <div id="message" class="hidden p-4 rounded-xl"></div>
                            </div>
                        </div>

                        <!-- Right: Result Section -->
                        <div class="p-8 lg:p-10 bg-gradient-to-br from-gray-50 to-white">
                            <div class="h-full flex flex-col">
                                <div class="flex items-center gap-3 mb-6">
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="text-lg font-semibold text-gray-800">处理结果</h3>
                                        <p class="text-sm text-gray-500">透明背景图片</p>
                                    </div>
                                </div>

                                <!-- Result Display -->
                                <div id="result-section" class="hidden flex-1 flex flex-col fade-in">
                                    <div class="flex-1 bg-gray-100 rounded-2xl overflow-hidden relative mb-4">
                                        <!-- Checkerboard background -->
                                        <div class="absolute inset-0" style="background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;"></div>
                                        <img id="result-image" class="relative z-10 w-full h-full object-contain" alt="Result">
                                    </div>
                                    <button id="download-btn" class="w-full btn-success text-white py-4 px-6 rounded-xl font-semibold flex items-center justify-center gap-2">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                        </svg>
                                        下载图片
                                    </button>
                                </div>

                                <!-- Placeholder -->
                                <div id="placeholder" class="flex-1 flex flex-col items-center justify-center text-center">
                                    <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center mb-4">
                                        <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2z"/>
                                        </svg>
                                    </div>
                                    <h4 class="text-lg font-semibold text-gray-700 mb-2">等待处理</h4>
                                    <p class="text-sm text-gray-500 max-w-xs">上传图片后点击"开始处理"<br>AI 将自动移除背景</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Features -->
                <div class="grid md:grid-cols-3 gap-6 mt-12">
                    <div class="glass-effect rounded-2xl p-6 text-center border border-white/30">
                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <h4 class="text-lg font-semibold text-gray-800 mb-2">极速处理</h4>
                        <p class="text-sm text-gray-600">优化的 AI 模型，秒出结果</p>
                    </div>
                    <div class="glass-effect rounded-2xl p-6 text-center border border-white/30">
                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 018.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 0115.382-.257A12 12 0 0115 12a11.955 11.955 0 0115.382 12.257A11.955 11.955 0 0112 21.056a11.955 11.955 0 018.618 16.016A11.955 11.955 0 0112 21.056a11.955 11.955 0 0112 21.056a11.955 11.955 0 0112 21.056a11.955 11.955 0 018.618 16.016"/>
                            </svg>
                        </div>
                        <h4 class="text-lg font-semibold text-gray-800 mb-2">高质量结果</h4>
                        <p class="text-sm text-gray-600">先进的 AI 算法，边缘更平滑</p>
                    </div>
                    <div class="glass-effect rounded-2xl p-6 text-center border border-white/30">
                        <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2h-4a2 2 0 00-4 4v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-4-4h-4a4 4 0 00-4 4v6a4 4 0 004 4h4a4 4 0 004-4zm-9 0v2h6v-2"/>
                            </svg>
                        </div>
                        <h4 class="text-lg font-semibold text-gray-800 mb-2">隐私保护</h4>
                        <p class="text-sm text-gray-600">图片处理完自动删除，不保存</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="glass-effect border-t border-white/20 mt-auto">
            <div class="max-w-6xl mx-auto px-6 py-6">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <p class="text-sm text-gray-600">
                        © 2024 图片工具 · 由 AI 驱动
                    </p>
                    <div class="flex items-center gap-4">
                        <a href="https://github.com/openclawdoris/image-background-remover" target="_blank" class="text-sm text-gray-600 hover:text-gray-800 transition-colors flex items-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.387-2.689-.047-2.088.717-.357-2.689-.357-1.083.036 2.07.48 2.07.48 1.634-1.089 2.679-.417 2.679-.417.476-1.416.583-1.861 1.084-2.294.098-.252.469-1.082 1.084-2.294-2.902-.319-5.955-1.451-5.955-6.454 0-1.422.509-2.582 1.347-3.493-.135-.326-.584-1.635.128-3.403 0 0 1.096-.35 3.595 1.341.041-.289 2.155-.434 3.271-.438 1.115.004 2.227.149 3.271.438 2.498-1.691 3.595-1.341 3.595-1.341.713 1.768.264 3.077.129 3.403.839.911 1.347 2.071 1.347 3.493 0 4.602-3.055 6.135-5.955 6.454-5.955 6.454z"/>
                            </svg>
                            GitHub
                        </a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // 配置：请修改为你的后端 API 地址
        const API_BASE = 'https://image-background-remover-production-aae0.up.railway.app';
        
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const previewSection = document.getElementById('preview-section');
        const previewImage = document.getElementById('preview-image');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const processBtn = document.getElementById('process-btn');
        const processText = document.getElementById('process-text');
        const processingText = document.getElementById('processing-text');
        const resetBtn = document.getElementById('reset-btn');
        const resultSection = document.getElementById('result-section');
        const resultImage = document.getElementById('result-image');
        const downloadBtn = document.getElementById('download-btn');
        const placeholder = document.getElementById('placeholder');
        const messageDiv = document.getElementById('message');

        let selectedFile = null;
        let resultId = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileName.textContent = file.name;
                fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                previewImage.src = URL.createObjectURL(file);
                previewSection.classList.remove('hidden');
                resultSection.classList.add('hidden');
                placeholder.classList.remove('hidden');
                hideMessage();
            }
        });

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            processText.classList.add('hidden');
            processingText.classList.remove('hidden');
            hideMessage();

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);

                const response = await fetch(`${API_BASE}/api/remove-background`, {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (data.success) {
                    resultId = data.output_id;
                    // 支持直接 base64 图片数据
                    if (data.image_data) {
                        resultImage.src = data.image_data;
                    } else {
                        resultImage.src = `${API_BASE}/api/output/${resultId}`;
                    }
                    resultSection.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    showMessage('处理成功！', 'success');
                } else {
                    showMessage(data.detail || '处理失败，请重试', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请确保后端服务已启动', 'error');
                console.error('Processing error:', error);
            } finally {
                processBtn.disabled = false;
                processText.classList.remove('hidden');
                processingText.classList.add('hidden');
            }
        });

        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            resultId = null;
            fileInput.value = '';
            previewSection.classList.add('hidden');
            resultSection.classList.add('hidden');
            placeholder.classList.remove('hidden');
            hideMessage();
        });

        downloadBtn.addEventListener('click', () => {
            if (resultImage.src) {
                const a = document.createElement('a');
                a.href = resultImage.src;
                a.download = 'image-no-bg.png';
                a.click();
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.classList.remove('hidden', 'bg-green-50', 'text-green-800', 'bg-red-50', 'text-red-800');
            if (type === 'success') {
                messageDiv.classList.add('bg-green-50', 'text-green-800');
            } else {
                messageDiv.classList.add('bg-red-50', 'text-red-800');
            }
        }

        function hideMessage() {
            messageDiv.classList.add('hidden');
        }
    </script>
</body>
</html>
